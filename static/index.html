<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Phone</title>
<script src="https://sdk.twilio.com/js/client/releases/1.14.0/twilio.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #2a2022;
    --surface:   #362b2e;
    --surface2:  #3d3033;
    --border:    #4f3e42;
    --border2:   #5c474b;
    --text:      #e2d8d4;
    --muted:     #a89590;
    --dimmed:    #7a6560;
    --green:     #7a9e7e;
    --green-bg:  #2a3a2c;
    --red:       #c0605a;
    --red-bg:    #3a1f1e;
    --blue:      #8faabe;
    --accent:    #e2d8d4;
    --accent-dk: #4f484b;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .app {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ── Status bar ── */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 4px 0;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--dimmed);
    transition: background 0.35s, box-shadow 0.35s;
    flex-shrink: 0;
  }
  .dot.ready   { background: var(--green); box-shadow: 0 0 6px rgba(122,158,126,.5); }
  .dot.calling { background: #c9a96e;      box-shadow: 0 0 6px rgba(201,169,110,.5); animation: blink 1s infinite; }
  .dot.active  { background: var(--blue);  box-shadow: 0 0 6px rgba(143,170,190,.5); }
  .dot.error   { background: var(--red); }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  .status-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── Phone card ── */
  .phone-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
  }

  /* display */
  .display {
    padding: 28px 28px 22px;
    border-bottom: 1px solid var(--surface2);
    min-height: 110px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 6px;
  }

  .number-out {
    font-family: 'DM Mono', monospace;
    font-size: 30px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: .04em;
    min-height: 40px;
    display: flex;
    align-items: center;
    transition: color .25s;
    word-break: break-all;
  }
  .number-out.empty { color: #4a3a3e; }

  .timer {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--blue);
    letter-spacing: .08em;
    min-height: 17px;
  }

  /* dialpad */
  .dialpad {
    padding: 20px 28px 26px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .key {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 13px 6px;
    text-align: center;
    cursor: pointer;
    user-select: none;
    transition: background .12s, transform .08s, border-color .12s;
  }
  .key:hover  { background: #443438; border-color: #6a5458; }
  .key:active { transform: scale(.93); background: #4f484b; }

  .key .d { display: block; font-size: 20px; font-weight: 500; color: #e2d8d4; line-height: 1; }
  .key .l { display: block; font-size: 8px;  font-weight: 500; letter-spacing: .14em; color: #7a6560; margin-top: 3px; text-transform: uppercase; }

  /* action row */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    align-items: center;
  }

  .btn-call {
    background: var(--green);
    border: none;
    border-radius: 50%;
    width: 60px; height: 60px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto;
    grid-column: 2;
    transition: background .15s, transform .1s;
  }
  .btn-call:hover  { background: #5f7d63; }
  .btn-call:active { transform: scale(.92); }
  .btn-call.hangup { background: var(--red); }
  .btn-call.hangup:hover { background: #dc2626; }
  .btn-call svg { width: 22px; height: 22px; fill: #fff; }

  .btn-back {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    width: 52px; height: 52px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto;
    grid-column: 3;
    transition: all .12s;
  }
  .btn-back:hover  { background: var(--surface2); color: var(--text); }
  .btn-back:active { transform: scale(.92); }

  /* ── History card ── */
  .history-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
  }

  .history-head {
    padding: 14px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--surface2);
  }
  .history-head .label {
    font-size: 11px; font-weight: 600; letter-spacing: .14em;
    text-transform: uppercase; color: var(--dimmed);
  }
  .history-head .count { font-size: 11px; color: var(--dimmed); }

  .history-list { max-height: 230px; overflow-y: auto; }
  .history-list::-webkit-scrollbar { width: 3px; }
  .history-list::-webkit-scrollbar-thumb { background: #4f3e42; border-radius: 2px; }

  .h-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 20px;
    border-bottom: 1px solid #2e2326;
    cursor: pointer;
    transition: background .1s;
  }
  .h-item:last-child { border-bottom: none; }
  .h-item:hover { background: #16162a; }

  .h-icon {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .h-icon.out    { background: var(--green-bg); }
  .h-icon.out svg { fill: var(--green); }
  .h-icon.missed { background: var(--red-bg); }
  .h-icon.missed svg { fill: var(--red); }
  .h-icon svg { width: 14px; height: 14px; }

  .h-info { flex: 1; min-width: 0; }
  .h-num  { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: #c0c0d8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .h-meta { font-size: 11px; color: var(--dimmed); margin-top: 2px; }
  .h-dur  { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--dimmed); flex-shrink: 0; }

  .empty-msg { padding: 28px 20px; text-align: center; color: #7a6560; font-size: 13px; }
</style>
</head>
<body>
<div class="app">

  <div style="text-align:center; padding: 8px 0 2px;">
    <div style="font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:600; letter-spacing:.08em; color:#e2d8d4;">Benchmark Ledger Solutions</div>
    <div style="font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:#7a6560; margin-top:3px;">Staff Phone</div>
  </div>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span class="status-label" id="statusLabel">Connecting…</span>
  </div>

  <div class="phone-card">
    <div class="display">
      <div class="number-out empty" id="numOut">+1</div>
      <div class="timer" id="timer"></div>
    </div>

    <div class="dialpad">
      <div class="grid" id="grid">
        <div class="key" data-d="1"><span class="d">1</span><span class="l">&nbsp;</span></div>
        <div class="key" data-d="2"><span class="d">2</span><span class="l">ABC</span></div>
        <div class="key" data-d="3"><span class="d">3</span><span class="l">DEF</span></div>
        <div class="key" data-d="4"><span class="d">4</span><span class="l">GHI</span></div>
        <div class="key" data-d="5"><span class="d">5</span><span class="l">JKL</span></div>
        <div class="key" data-d="6"><span class="d">6</span><span class="l">MNO</span></div>
        <div class="key" data-d="7"><span class="d">7</span><span class="l">PQRS</span></div>
        <div class="key" data-d="8"><span class="d">8</span><span class="l">TUV</span></div>
        <div class="key" data-d="9"><span class="d">9</span><span class="l">WXYZ</span></div>
        <div class="key" data-d="*"><span class="d">*</span><span class="l">&nbsp;</span></div>
        <div class="key" data-d="0"><span class="d">0</span><span class="l">+</span></div>
        <div class="key" data-d="#"><span class="d">#</span><span class="l">&nbsp;</span></div>
      </div>

      <div class="actions">
        <div></div>
        <button class="btn-call" id="callBtn" aria-label="Call">
          <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
        </button>
        <button class="btn-back" id="backBtn" aria-label="Backspace">⌫</button>
      </div>
    </div>
  </div>

  <div class="history-card">
    <div class="history-head">
      <span class="label">Recent calls</span>
      <span class="count" id="callCount">0 calls</span>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-msg">No calls yet</div>
    </div>
  </div>

</div>
<script>
// ─── state ───────────────────────────────────────────────────────────────────
let num = '', device = null, conn = null, timerRef = null, t0 = null;
let history = JSON.parse(localStorage.getItem('ph_history') || '[]');

// ─── UI helpers ──────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

const CALL_SVG  = '<svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>';
const HANG_SVG  = '<svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z" transform="rotate(135,12,12)"/></svg>';

function setStatus(state, label) {
  $('dot').className = 'dot ' + state;
  $('statusLabel').textContent = label;
}

function refreshDisplay() {
  const el = $('numOut');
  if (!num) { el.textContent = '+1'; el.classList.add('empty'); }
  else       { el.textContent = num; el.classList.remove('empty'); }
}

function fmtPhone(n) {
  const d = n.replace(/\D/g,'');
  if (d.length === 11 && d[0] === '1')
    return `+1 (${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
  return n;
}

function fmtDur(s) {
  if (s < 60) return s + 's';
  return Math.floor(s/60) + 'm' + (s%60 ? ' '+(s%60)+'s' : '');
}

function timeAgo(ts) {
  const d = Math.floor((Date.now()-ts)/1000);
  if (d < 60)   return 'just now';
  if (d < 3600) return Math.floor(d/60) + 'm ago';
  if (d < 86400)return Math.floor(d/3600) + 'h ago';
  return Math.floor(d/86400) + 'd ago';
}

// ─── call timer ──────────────────────────────────────────────────────────────
function startTimer() {
  t0 = Date.now();
  timerRef = setInterval(() => {
    const e = Math.floor((Date.now()-t0)/1000);
    const m = String(Math.floor(e/60)).padStart(2,'0');
    const s = String(e%60).padStart(2,'0');
    $('timer').textContent = m+':'+s;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerRef); timerRef = null;
  const dur = t0 ? Math.floor((Date.now()-t0)/1000) : 0;
  t0 = null; $('timer').textContent = '';
  return dur;
}

// ─── history ─────────────────────────────────────────────────────────────────
function saveHistory(n, status, dur) {
  history.unshift({ n, status, dur, ts: Date.now() });
  if (history.length > 60) history.pop();
  localStorage.setItem('ph_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const list = $('historyList');
  $('callCount').textContent = history.length + ' call' + (history.length!==1?'s':'');
  if (!history.length) { list.innerHTML = '<div class="empty-msg">No calls yet</div>'; return; }

  const OUT_ICO  = '<svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>';
  const MISS_ICO = '<svg viewBox="0 0 24 24"><path d="M17.4 13.2l-2.2 2.2c-2.8-1.5-5.2-3.8-6.6-6.6l2.2-2.2c.3-.3.4-.7.2-1-.4-1.1-.6-2.3-.6-3.6 0-.6-.4-1-1-1H6C5.4 1 5 1.4 5 2c0 9.4 7.6 17 17 17 .6 0 1-.4 1-1v-3.5c0-.6-.4-1-1-1-1.3 0-2.5-.2-3.6-.6-.3-.1-.7 0-1 .3z"/></svg>';

  list.innerHTML = history.map(c => {
    const cls = c.status === 'missed' ? 'missed' : 'out';
    const ico = cls === 'missed' ? MISS_ICO : OUT_ICO;
    return `<div class="h-item" onclick="dialFromHistory('${c.n}')">
      <div class="h-icon ${cls}">${ico}</div>
      <div class="h-info">
        <div class="h-num">${fmtPhone(c.n)}</div>
        <div class="h-meta">${timeAgo(c.ts)}</div>
      </div>
      <div class="h-dur">${c.dur ? fmtDur(c.dur) : ''}</div>
    </div>`;
  }).join('');
}

function dialFromHistory(n) {
  if (conn) return;
  num = n; refreshDisplay();
}

// ─── dialpad events ──────────────────────────────────────────────────────────
document.querySelectorAll('.key').forEach(k => {
  k.addEventListener('click', () => {
    if (conn) return;
    if (num.length < 15) { num += k.dataset.d; refreshDisplay(); }
  });
});

$('backBtn').addEventListener('click', () => {
  if (conn) return;
  num = num.slice(0,-1); refreshDisplay();
});

// ─── call button ─────────────────────────────────────────────────────────────
$('callBtn').addEventListener('click', () => {
  if (!device) return;

  if (conn) {                         // hang up
    conn.disconnect();
    return;
  }

  const to = num.startsWith('+') ? num : '+1' + num.replace(/\D/g,'');
  if (to.replace(/\D/g,'').length < 10) {
    setStatus('error','Enter a valid number');
    setTimeout(()=>setStatus('ready','Ready'), 2500);
    return;
  }

  setStatus('calling','Calling…');
  $('callBtn').classList.add('hangup');
  $('callBtn').innerHTML = HANG_SVG;

  conn = device.connect ? device.connect({ To: to }) : device.connect({ params: { To: to } });

  conn.on('accept', () => { setStatus('active','On call'); startTimer(); });

  conn.on('disconnect', () => {
    const dur = stopTimer();
    saveHistory(to, 'completed', dur);
    conn = null;
    $('callBtn').classList.remove('hangup');
    $('callBtn').innerHTML = CALL_SVG;
    setStatus('ready','Ready');
  });

  conn.on('error', err => {
    stopTimer();
    saveHistory(to, 'missed', 0);
    conn = null;
    $('callBtn').classList.remove('hangup');
    $('callBtn').innerHTML = CALL_SVG;
    setStatus('error','Call failed — ' + (err.message||'unknown error'));
    setTimeout(()=>setStatus('ready','Ready'), 4000);
    console.error(err);
  });
});

// ─── init Twilio Device ──────────────────────────────────────────────────────
async function init() {
  setStatus('', 'Connecting…');
  try {
    const res = await fetch('/token');
    if (!res.ok) throw new Error('Token fetch failed: ' + res.status);
    const data = await res.json();
    if (!data.token) throw new Error('No token in response');

    if (device) { try { device.destroy(); } catch(e){} }

    device = new Twilio.Device(data.token, {
      codecPreferences: ['opus', 'pcmu'],
      logLevel: 1
    });

    device.on('ready',   () => setStatus('ready', 'Ready'));
    device.on('error',   err => {
      console.error('Device error:', err);
      setStatus('error', err.message || 'Device error');
      setTimeout(init, 8000);
    });
    device.on('offline', () => { setStatus('', 'Reconnecting…'); setTimeout(init, 6000); });

  } catch(e) {
    console.error('Init error:', e);
    setStatus('error', 'Connection failed — retrying…');
    setTimeout(init, 8000);
  }
}

// ─── boot ────────────────────────────────────────────────────────────────────
renderHistory();

// AudioContext requires a user gesture on Chrome — start on first click
let started = false;
function ensureStarted() {
  if (started) return;
  started = true;
  document.getElementById('overlay').style.display = 'none';
  init();
}
document.getElementById('startBtn').addEventListener('click', ensureStarted);
</script>

<div id="overlay" style="position:fixed;inset:0;background:rgba(30,18,20,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;">
  <div style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:#e2d8d4;letter-spacing:.06em;">Benchmark Ledger Solutions</div>
  <div style="font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#7a6560;">Staff Phone</div>
  <button id="startBtn" style="margin-top:16px;background:#4f484b;color:#e2d8d4;border:1px solid #7a6560;border-radius:50px;padding:14px 44px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;letter-spacing:.06em;cursor:pointer;transition:background .2s;">Tap to Start</button>
</div>
</body>
</html>
